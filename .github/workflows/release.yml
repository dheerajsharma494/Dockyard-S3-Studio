name: Build & Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

jobs:
    build-mac:
        name: Build macOS (DMG)
        runs-on: macos-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build Next.js + package DMG
              run: npm run desktop:dist:mac
              env:
                  # Skip notarization in CI (no Apple certs)
                  SKIP_NOTARIZE: true

            - name: Upload macOS artifact
              uses: actions/upload-artifact@v4
              with:
                  name: mac-dmg
                  path: dist/*.dmg
                  retention-days: 1

    build-win:
        name: Build Windows (NSIS)
        runs-on: windows-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build Next.js + package installer
              run: npm run desktop:dist:win

            - name: Upload Windows artifact
              uses: actions/upload-artifact@v4
              with:
                  name: win-installer
                  path: dist/*.exe
                  retention-days: 1

    release:
        name: Publish GitHub Release
        needs: [ build-mac, build-win ]
        runs-on: ubuntu-latest
        steps:
            - name: Download macOS artifact
              uses: actions/download-artifact@v4
              with:
                  name: mac-dmg
                  path: artifacts/mac

            - name: Download Windows artifact
              uses: actions/download-artifact@v4
              with:
                  name: win-installer
                  path: artifacts/win

            - name: Create GitHub Release and upload files
              uses: softprops/action-gh-release@v2
              with:
                  name: "Dockyard S3 Studio ${{ github.ref_name }}"
                  draft: false
                  prerelease: false
                  generate_release_notes: true
                  files: |
                      artifacts/mac/*.dmg
                      artifacts/win/*.exe
